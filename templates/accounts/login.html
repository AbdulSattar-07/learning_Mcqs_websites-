{% extends 'base.html' %}

{% block title %}Login - MCQ Platform{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow">
            <div class="card-body p-5">
                <h2 class="text-center mb-4">
                    <i class="bi bi-box-arrow-in-right"></i> Login
                </h2>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        {{ form.username }}
                    </div>
                    <div class="mb-3">
                        {{ form.password }}
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-box-arrow-in-right"></i> Login
                        </button>
                    </div>
                </form>
                <hr class="my-4">
                <div class="text-center">
                    <p class="text-muted mb-3">Don't have access?</p>
                    <div class="d-grid gap-2">
                        <a href="{% url 'accounts:subscription_request' %}" class="btn btn-success">
                            <i class="bi bi-whatsapp"></i> Get MCQ Access
                        </a>
                        <a href="{{ WHATSAPP_LINK }}" target="_blank" class="btn btn-outline-success">
                            <i class="bi bi-whatsapp"></i> WhatsApp: {{ WHATSAPP_NUMBER }}
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

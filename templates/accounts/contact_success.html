{% extends 'base.html' %}

{% block title %}Request Submitted - MCQ Platform{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6 text-center">
        <div class="card shadow">
            <div class="card-body p-5">
                <i class="bi bi-check-circle-fill text-success" style="font-size: 5rem;"></i>
                <h2 class="mt-4 mb-3">Request Submitted!</h2>
                <p class="lead">
                    Thank you for your interest. The administrator will review your request
                    and contact you soon regarding MCQ access.
                </p>
                <hr class="my-4">
                <a href="{% url 'home' %}" class="btn btn-primary">
                    <i class="bi bi-house"></i> Back to Home
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
